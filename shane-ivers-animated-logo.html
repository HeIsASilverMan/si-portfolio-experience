<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shane Ivers — Animated Logo</title>
  <style>
    /* ============================================================
       ANIMATED SI MARK LOGO — standalone extract
       Drop the .si-logo-wrap element anywhere on your page and
       include this CSS. No JS required.
       ============================================================ */

    /* Keyframes */
    @keyframes si-box-draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes si-reveal-down {
      from { clip-path: inset(0 0 100% 0); }
      to   { clip-path: inset(0 0 0% 0); }
    }

    /* Container — change width/height to whatever size you need */
    .si-logo-wrap {
      display: inline-block;
      width: 200px;
      height: 200px;
    }

    .si-logo-wrap svg {
      width: 100%;
      height: 100%;
      color: #D4A853; /* gold — change to any colour or use currentColor */
      overflow: visible;
    }

    /* 1. Box outline draws in */
    .si-logo-box {
      animation: si-box-draw 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }

    /* 2. S curve reveals top-to-bottom */
    .si-logo-s {
      clip-path: inset(0 0 100% 0);
      animation: si-reveal-down 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.95s forwards;
    }

    /* 3. Bridge shape reveals */
    .si-logo-bridge {
      clip-path: inset(0 0 100% 0);
      animation: si-reveal-down 0.5s cubic-bezier(0.4, 0, 0.2, 1) 1.1s forwards;
    }

    /* 4. Vertical bars reveal staggered left to right */
    .si-logo-bar {
      clip-path: inset(0 0 100% 0);
      animation: si-reveal-down 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .si-logo-bar:nth-child(4) { animation-delay: 1.25s; }
    .si-logo-bar:nth-child(5) { animation-delay: 1.35s; }
    .si-logo-bar:nth-child(6) { animation-delay: 1.45s; }
    .si-logo-bar:nth-child(7) { animation-delay: 1.55s; }
    .si-logo-bar:nth-child(8) { animation-delay: 1.65s; }

    /* Respect user motion preferences */
    @media (prefers-reduced-motion: reduce) {
      .si-logo-box,
      .si-logo-s,
      .si-logo-bridge,
      .si-logo-bar {
        animation: none;
        opacity: 1;
        clip-path: none;
        stroke-dashoffset: 0;
      }
    }

    /* ============================================================
       DEMO PAGE STYLES — remove everything below this line
       when embedding on your site
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      font-family: sans-serif;
    }

    p {
      color: #9B978E;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       COPY FROM HERE
       ============================================================ -->
  <div class="si-logo-wrap" aria-label="Shane Ivers" role="img">
    <svg viewBox="0 0 127.3 127.3" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <!-- Box outline draws first -->
      <rect class="si-logo-box"
        x="3" y="3" width="121.3" height="121.3"
        fill="none"
        stroke="currentColor"
        stroke-width="6"
        stroke-dasharray="486"
        stroke-dashoffset="486"/>

      <!-- S curve — left organic shape -->
      <g class="si-logo-s">
        <path fill-rule="evenodd" fill="currentColor"
          d="M54.34,71.54C38.76,49.86,38.02,21.96,50.12,0H0v127.3h45.65c17.57-13.05,21.5-37.92,8.69-55.76Z"/>
      </g>

      <!-- Bridge — right organic shape -->
      <g class="si-logo-bridge">
        <path fill-rule="evenodd" fill="currentColor"
          d="M93.66,127.3c0-42.43,0-84.86,0-127.3h-8.67c-17.73,13.01-21.74,37.99-8.88,55.89,15.54,21.63,16.31,49.46,4.3,71.4h13.24Z"/>
      </g>

      <!-- Vertical bars — staggered left to right -->
      <g class="si-logo-bar">
        <path fill-rule="evenodd" fill="currentColor"
          d="M99.45,0h-2.89c0,42.43,0,84.86,0,127.3h2.89V0Z"/>
      </g>

      <g class="si-logo-bar">
        <path fill-rule="evenodd" fill="currentColor"
          d="M105.25,127.3h-2.89c0-42.43,0-84.86,0-127.3h2.89v127.3Z"/>
      </g>

      <g class="si-logo-bar">
        <path fill-rule="evenodd" fill="currentColor"
          d="M111.05,0h-2.89c0,42.43,0,84.86,0,127.3h2.89V0Z"/>
      </g>

      <g class="si-logo-bar">
        <path fill-rule="evenodd" fill="currentColor"
          d="M116.84,0h-2.89c0,42.43,0,84.86,0,127.3h2.89V0Z"/>
      </g>

      <g class="si-logo-bar">
        <path fill-rule="evenodd" fill="currentColor"
          d="M119.75,0c0,42.43,0,84.86,0,127.3h7.55V0h-7.55Z"/>
      </g>

    </svg>
  </div>

       ============================================================ -->

</body>
</html>
